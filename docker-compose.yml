services:
  postgres:
    image: postgres:latest
    container_name: diceFactory
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: qwertyuiop
      POSTGRES_DB: diceFactory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d diceFactory"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5050:5432"
    restart: always

  spring-boot:
    build: .
    pull_policy: build
    ports:
      - "8080:8080"
    container_name: spring-boot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/diceFactory
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      POSTGRES_HOST: db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: qwertyuiop



